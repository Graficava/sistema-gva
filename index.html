<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVA • Sistema de Gestão</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>

    <div id="telaLogin">
        <div class="login-caixa">
            <img src="logo GVA azul.png" alt="Logo GVA" style="width: 180px; margin-bottom: 20px;">
            <input type="email" id="loginEmail" placeholder="E-mail de Acesso">
            <input type="password" id="loginSenha" placeholder="Senha">
            <button class="acao" onclick="fazerLogin()">Acessar Painel GVA</button>
        </div>
    </div>

    <header>
        <div class="container-header">
            <img id="logoGVA" src="logo GVA br.png" alt="GVA Venom Arts" class="logo-img">
            <button onclick="fazerLogout()" class="btn-sair">Sair</button>
        </div>
    </header>

    <nav class="tabs">
        <div class="container-nav">
            <button id="btnCliente" class="active" onclick="mudarAba('cliente')">Catálogo</button>
            <button id="btnCarrinho" onclick="mudarAba('carrinho')">Orçamento</button>
            <button id="btnLoja" onclick="mudarAba('loja')">Produção</button>
            <button id="btnCaixa" class="aba-restrita" onclick="mudarAba('caixa')" style="display: none;">Financeiro</button>
            <button id="btnAdmin" class="aba-restrita" onclick="mudarAba('admin')" style="display: none;">Configurações</button>
        </div>
    </nav>

    <main class="container">
        <div id="abaCliente" class="content active">
            <div class="barra-busca">
                <input type="text" id="buscaProduto" placeholder="🔍 O que o cliente procura hoje?" oninput="filtrarProdutos()">
            </div>
            <div class="grid" id="gradeCliente">Sincronizando banco de dados...</div>
        </div>

        <div id="abaCarrinho" class="content">
            <div class="card-orcamento">
                <div id="listaCarrinho">Selecione produtos no catálogo.</div>
                <hr>
                <div class="form-cliente">
                    <select id="tipoCliente" onchange="ajustarCamposCliente()">
                        <option value="PF">Pessoa Física</option>
                        <option value="PJ">Pessoa Jurídica</option>
                    </select>
                    <input type="text" id="nomeCliente" placeholder="Nome Completo / Razão Social">
                    <input type="text" id="docCliente" placeholder="CPF ou CNPJ">
                    <input type="tel" id="telCliente" placeholder="WhatsApp (com DDD)">
                    <textarea id="obsPedido" placeholder="Detalhes técnicos (Ex: Laminação, tipo de corte, etc)"></textarea>
                    <input type="date" id="dataEntrega">
                </div>
                <div class="financeiro-resumo">
                    <div>Total: <b>R$ <span id="totalCarrinho">0,00</span></b></div>
                    <div>Sinal: <input type="number" id="valorSinal" value="0" oninput="atualizarCarrinho()"></div>
                    <div class="restante">Resta: <b>R$ <span id="restanteCarrinho">0,00</span></b></div>
                </div>
                <button class="acao btn-finalizar" onclick="enviarPedido()">Gerar Pedido e Notificar</button>
            </div>
        </div>

        <div id="abaAdmin" class="content">
            <div class="painel-admin">
                <h2>📦 Gestão de Produtos</h2>
                <label>Nome do Produto:</label>
                <input type="text" id="adminNome" placeholder="Ex: Banner Lona 440g">
                
                <label>Tipo de Cobrança:</label>
                <select id="adminTipo">
                    <option value="unidade">Preço por Unidade (Fixo)</option>
                    <option value="m2">Cálculo por Metro Quadrado ($m^2$)</option>
                    <option value="folha">Cálculo por Folha/Página (Apostila)</option>
                </select>

                <label>Preço Base (R$):</label>
                <input type="number" id="adminPreco" step="0.01" placeholder="0.00">

                <label>Link da Imagem:</label>
                <input type="text" id="adminImg" placeholder="Link da foto do produto">

                <label>Categoria:</label>
                <select id="adminCategoria">
                    <option>Papelaria</option>
                    <option>Comunicação Visual</option>
                    <option>Brindes</option>
                    <option>Serviços Rapidos</option>
                </select>

                <button class="acao" onclick="salvarNovoProduto()">Cadastrar na Nuvem</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="container-footer">
            <div class="footer-info">
                <b>GVA • Venom Arts</b><br>
                Rua Sua Rua, 123 - Bairro | (21) 98888-8888<br>
                <span class="social">@graficavenomarts | graficavenomarts.com.br</span>
            </div>
            <div class="footer-status">
                <span class="status-bolinha"></span> Sistema Online
            </div>
        </div>
    </footer>

    <div id="alertaFundo"><div id="alertaCaixa"><div id="alertaTexto"></div><button class="acao" onclick="fecharAlerta()">Ok</button></div></div>

    <script src="script.js"></script>
</body>
</html>
