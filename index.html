<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVA • Sistema Profissional</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="gva-body">

    <div id="telaLogin">
        <div class="login-caixa">
            <img src="logo GVA azul.png" alt="GVA" width="160">
            <input type="email" id="loginEmail" placeholder="E-mail">
            <input type="password" id="loginSenha" placeholder="Senha">
            <button class="btn-gva" onclick="fazerLogin()">Entrar no Sistema</button>
        </div>
    </div>

    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo"><img src="logo GVA br.png" alt="GVA"></div>
            <nav class="sidebar-nav">
                <button id="btnCliente" class="active" onclick="mudarAba('cliente')"><i class="fa fa-th-large"></i> Catálogo</button>
                <button id="btnCarrinho" onclick="mudarAba('carrinho')"><i class="fa fa-shopping-cart"></i> Orçamento</button>
                <button id="btnLoja" onclick="mudarAba('loja')"><i class="fa fa-tasks"></i> Produção</button>
                <div class="aba-restrita" style="display:none;">
                    <div class="nav-divider">Gerenciamento</div>
                    <button id="btnCaixa" onclick="mudarAba('caixa')"><i class="fa fa-chart-line"></i> Financeiro</button>
                    <button id="btnAdmin" onclick="mudarAba('admin')"><i class="fa fa-cog"></i> Admin</button>
                </div>
            </nav>
            <div class="sidebar-footer"><button onclick="fazerLogout()" class="btn-sair">Sair</button></div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1 id="tituloPagina">Catálogo</h1>
                <div class="header-info">GVA • Gráfica Venom Arts</div>
            </header>

            <div class="content-wrapper">
                
                <section id="abaCliente" class="content active">
                    <div class="search-container"><input type="text" id="buscaProduto" placeholder="Pesquisar..." oninput="filtrarProdutos()"></div>
                    <div class="cat-nav" id="menuCategorias"></div>
                    <div class="zap-grid" id="gradeCliente"></div>
                </section>

                <section id="abaCarrinho" class="content">
                    <div class="flex-row">
                        <div class="flex-main">
                            <div class="gva-card">
                                <div class="card-header">Itens Selecionados</div>
                                <div id="listaCarrinho" class="card-body">Aguardando itens...</div>
                            </div>
                            <div class="gva-card">
                                <div class="card-header">Ficha do Cliente</div>
                                <div class="card-body gva-form-large">
                                    <div class="form-row">
                                        <div class="form-group"><label>Tipo:</label><select id="tipoCliente"><option value="PF">PF</option><option value="PJ">PJ</option></select></div>
                                        <div class="form-group" style="flex:2;"><label>Nome / Razão Social:</label><input type="text" id="nomeCliente"></div>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group"><label>CPF / CNPJ:</label><input type="text" id="docCliente"></div>
                                        <div class="form-group"><label>WhatsApp:</label><input type="tel" id="telCliente"></div>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group" style="flex:2;"><label>Endereço Completo:</label><input type="text" id="endCliente"></div>
                                        <div class="form-group"><label>CEP:</label><input type="text" id="cepCliente"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="flex-side">
                            <div class="gva-card">
                                <div class="card-header">Pagamento e Envio</div>
                                <div class="card-body gva-form-large">
                                    <label>Forma:</label>
                                    <select id="formaPagamento" onchange="toggleCamposPagamento()">
                                        <option value="Pix">Pix</option><option value="Dinheiro">Dinheiro</option><option value="Débito">Débito</option>
                                        <option value="Credito">Crédito à Vista</option><option value="CreditoParc">Crédito Parcelado</option>
                                    </select>
                                    <div id="divParcelas" style="display:none; margin-top:10px;">
                                        <label>Parcelas:</label><select id="qtdParcelas"><option>2x</option><option>3x</option><option>4x</option><option>5x</option><option>6x</option><option>10x</option><option>12x</option></select>
                                    </div>
                                    <label style="margin-top:15px;">Entrega:</label>
                                    <select id="metodoEntrega" onchange="toggleCamposEntrega()">
                                        <option value="Retirada">Retirada na Loja</option><option value="Motoboy">Motoboy</option>
                                    </select>
                                    <div id="divMotoboy" style="display:none; margin-top:10px;">
                                        <label>Taxa Motoboy (R$):</label><input type="number" id="valorMotoboy" value="0" step="0.01" oninput="atualizarCarrinho()">
                                    </div>
                                    <hr>
                                    <p>Total: <b>R$ <span id="totalCarrinho">0,00</span></b></p>
                                    <label>Sinal (R$):</label><input type="number" id="valorSinal" value="0" step="0.01" oninput="atualizarCarrinho()">
                                    <p style="color:red; font-weight:bold;">A Pagar: R$ <span id="restanteCarrinho">0,00</span></p>
                                    <button class="btn-success" onclick="enviarPedido()">Salvar e Produzir</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="abaAdmin" class="content">
                    <div class="sub-nav-gva">
                        <button id="subBtnProdutos" class="sub-active" onclick="toggleAdminSub('produtos')">Produtos</button>
                        <button id="subBtnAcabamentos" onclick="toggleAdminSub('acabamentos')">Acabamentos</button>
                        <button id="subBtnMenus" onclick="toggleAdminSub('menus')">Categorias</button>
                    </div>

                    <div id="subAdminProdutos" class="admin-panel">
                        <div class="gva-card">
                            <div class="card-body gva-form-large">
                                <input type="hidden" id="editId">
                                <div class="form-row">
                                    <div class="form-group"><label>SKU:</label><input type="text" id="adminSku"></div>
                                    <div class="form-group" style="flex:2;"><label>Produto:</label><input type="text" id="adminNome"></div>
                                    <div class="form-group"><label>R$ Base:</label><input type="number" id="adminPreco" step="0.01"></div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group"><label>Categoria:</label><select id="adminCatSelect"></select></div>
                                    <div class="form-group"><label>Tipo Cálculo:</label>
                                        <select id="adminTipo">
                                            <option value="unidade">Unidade</option>
                                            <option value="m_linear">Metro Linear (Banner 1.50m)</option>
                                            <option value="m2">M² (Lona 3.10m)</option>
                                            <option value="folha">Página (Apostila)</option>
                                        </select>
                                    </div>
                                </div>
                                <input type="text" id="adminImg" placeholder="Link da Imagem">
                                <button id="btnSalvarProd" class="btn-gva" onclick="salvarNovoProduto()">Salvar Produto</button>
                            </div>
                        </div>
                        <div class="gva-card"><div class="card-header">Lista de Produtos</div><div id="listaGerenciarProdutos" class="card-body"></div></div>
                    </div>

                    <div id="subAdminAcabamentos" class="admin-panel" style="display:none;">
                        <div class="gva-card">
                            <div class="card-body gva-form-large">
                                <input type="hidden" id="editAcabId">
                                <div class="form-row">
                                    <input type="text" id="acabNome" placeholder="Ex: Ilhós">
                                    <input type="number" id="acabPreco" placeholder="R$ Adicional" step="0.01">
                                    <button id="btnSalvarAcab" class="btn-gva" onclick="salvarAcabamento()">Salvar Acabamento</button>
                                </div>
                            </div>
                        </div>
                        <div class="gva-card"><div class="card-header">Acabamentos Salvos</div><div id="listaGerenciarAcabamentos" class="card-body"></div></div>
                    </div>

                    <div id="subAdminMenus" class="admin-panel" style="display:none;">
                        <div class="gva-card">
                            <div class="card-body gva-form-large">
                                <input type="hidden" id="editCatId">
                                <div class="form-row">
                                    <input type="text" id="catNome" placeholder="Ex: Lona">
                                    <button id="btnSalvarCat" class="btn-gva" onclick="salvarCategoria()">Salvar Categoria</button>
                                </div>
                            </div>
                        </div>
                        <div class="gva-card"><div class="card-header">Categorias do Menu</div><div id="listaGerenciarCategorias" class="card-body"></div></div>
                    </div>
                </section>

                <section id="abaCaixa" class="content">
                    <div class="gva-card">
                        <div class="card-header">Resumo Financeiro</div>
                        <div class="card-body">
                            <div class="financeiro-grid">
                                <div class="fin-box entries"><h4>Vendas</h4><p>R$ <span id="finFaturamento">0,00</span></p></div>
                                <div class="fin-box exits"><h4>Saídas</h4><p>R$ <span id="finSaidas">0,00</span></p></div>
                                <div class="fin-box total"><h4>Caixa</h4><p>R$ <span id="finSaldo">0,00</span></p></div>
                            </div>
                            <div style="display:flex; gap:10px; margin-top:20px;">
                                <button class="btn-gva" onclick="abrirLancamento('entrada')" style="background:#28a745;">+ Entrada</button>
                                <button class="btn-gva" onclick="abrirLancamento('saida')" style="background:#dc3545;">- Saída</button>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="abaLoja" class="content"><div id="listaProducao" class="prod-grid"></div></section>
            </div>
        </main>
    </div>

    <div id="modalFundo"><div id="modalConteudo" class="gva-card"></div></div>
    <div id="alertaFundo"><div id="alertaCaixa"><p id="alertaTexto"></p><button class="btn-gva" onclick="fecharAlerta()">Ok</button></div></div>
    <img id="logoGVA_Preto" src="logo GVA black.png" style="display:none;">

    <script src="script.js"></script>
</body>
</html>
