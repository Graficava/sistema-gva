<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVA • Sistema de Gestão</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="gva-body">

    <div id="telaLogin">
        <div class="login-caixa">
            <img src="logo GVA azul.png" alt="GVA" width="160">
            <input type="email" id="loginEmail" placeholder="E-mail">
            <input type="password" id="loginSenha" placeholder="Senha">
            <button class="btn-gva" onclick="fazerLogin()">Entrar</button>
        </div>
    </div>

    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo"><img src="logo GVA br.png" alt="GVA"></div>
            <nav class="sidebar-nav">
                <button id="btnCliente" class="active" onclick="mudarAba('cliente')"><i class="fa fa-th-large"></i> Catálogo</button>
                <button id="btnCarrinho" onclick="mudarAba('carrinho')"><i class="fa fa-shopping-cart"></i> Orçamento</button>
                <button id="btnLoja" onclick="mudarAba('loja')"><i class="fa fa-tasks"></i> Produção</button>
                <div class="aba-restrita" style="display:none;">
                    <div class="nav-divider">Gerenciamento</div>
                    <button id="btnCaixa" onclick="mudarAba('caixa')"><i class="fa fa-chart-line"></i> Financeiro</button>
                    <button id="btnAdmin" onclick="mudarAba('admin')"><i class="fa fa-cog"></i> Configurações</button>
                </div>
            </nav>
            <div class="sidebar-footer"><button onclick="fazerLogout()" class="btn-sair">Sair</button></div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1 id="tituloPagina">Catálogo</h1>
                <div class="header-info">GVA • Gráfica Venom Arts</div>
            </header>

            <div class="content-wrapper">
                
                <section id="abaCliente" class="content active">
                    <div class="search-container">
                        <input type="text" id="buscaProduto" placeholder="Pesquisar..." oninput="filtrarProdutos()">
                    </div>
                    <div class="cat-nav" id="menuCategorias"></div>
                    <div class="zap-grid" id="gradeCliente"></div>
                </section>

                <section id="abaCarrinho" class="content">
                    <div class="flex-row">
                        <div class="flex-main">
                            <div class="gva-card">
                                <div class="card-header">Carrinho de Itens</div>
                                <div id="listaCarrinho" class="card-body">Vazio.</div>
                            </div>
                            <div class="gva-card">
                                <div class="card-header">Dados do Cliente</div>
                                <div class="card-body gva-form-large">
                                    <div class="form-row">
                                        <div class="form-group"><label>Tipo:</label><select id="tipoCliente"><option value="PF">PF</option><option value="PJ">PJ</option></select></div>
                                        <div class="form-group" style="flex:2;"><label>Nome / Razão Social:</label><input type="text" id="nomeCliente"></div>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group"><label>CPF / CNPJ:</label><input type="text" id="docCliente"></div>
                                        <div class="form-group"><label>WhatsApp:</label><input type="tel" id="telCliente"></div>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group" style="flex:2;"><label>Endereço:</label><input type="text" id="endCliente"></div>
                                        <div class="form-group"><label>CEP:</label><input type="text" id="cepCliente"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="flex-side">
                            <div class="gva-card">
                                <div class="card-header">Pagamento e Entrega</div>
                                <div class="card-body gva-form-large">
                                    <label>Forma de Pagamento:</label>
                                    <select id="formaPagamento" onchange="toggleParcelas()">
                                        <option>Pix</option><option>Dinheiro</option><option>Débito</option>
                                        <option value="Credito">Crédito</option><option value="CreditoParc">Crédito Parc.</option>
                                    </select>
                                    <div id="divParcelas" style="display:none;">
                                        <label>Parcelas:</label><select id="qtdParcelas"><option>2x</option><option>3x</option><option>4x</option><option>5x</option><option>6x</option></select>
                                    </div>
                                    <label>Entrega:</label>
                                    <select id="metodoEntrega" onchange="toggleMotoboy()">
                                        <option value="Retirada">Retirada na Loja</option><option value="Motoboy">Motoboy</option>
                                    </select>
                                    <div id="divMotoboy" style="display:none;">
                                        <label>Taxa Motoboy (R$):</label><input type="number" id="valorMotoboy" value="0" oninput="atualizarCarrinho()">
                                    </div>
                                    <hr>
                                    <p>Total: <b>R$ <span id="totalCarrinho">0,00</span></b></p>
                                    <label>Sinal:</label><input type="number" id="valorSinal" value="0" oninput="atualizarCarrinho()">
                                    <p style="color:red; font-weight:bold;">Resta: R$ <span id="restanteCarrinho">0,00</span></p>
                                    <button class="btn-success" onclick="enviarPedido()">Finalizar</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="abaAdmin" class="content">
                    <div class="sub-nav-gva">
                        <button class="sub-active" onclick="toggleAdminSub('produtos')">Produtos</button>
                        <button onclick="toggleAdminSub('acabamentos')">Acabamentos</button>
                        <button onclick="toggleAdminSub('menus')">Categorias/Menus</button>
                    </div>

                    <div id="subAdminProdutos" class="admin-panel">
                        <div class="gva-card"><div class="card-header">Novo Produto</div>
                            <div class="card-body gva-form-large">
                                <input type="hidden" id="editId">
                                <div class="form-row">
                                    <input type="text" id="adminNome" placeholder="Nome">
                                    <input type="number" id="adminPreco" placeholder="Preço Base">
                                </div>
                                <div class="form-row">
                                    <select id="adminCatSelect"></select>
                                    <select id="adminTipo">
                                        <option value="unidade">Unidade</option>
                                        <option value="m_linear">Metro Linear (L: 1.50m)</option>
                                        <option value="m2">M² (L: 3.10m)</option>
                                        <option value="folha">Página (Apostila)</option>
                                    </select>
                                </div>
                                <input type="text" id="adminImg" placeholder="Link da Imagem">
                                <button class="btn-gva" onclick="salvarNovoProduto()">Cadastrar Produto</button>
                            </div>
                        </div>
                        <div id="listaGerenciarProdutos"></div>
                    </div>

                    <div id="subAdminAcabamentos" class="admin-panel" style="display:none;">
                        <div class="gva-card"><div class="card-header">Novo Acabamento</div>
                            <div class="card-body gva-form-large">
                                <input type="text" id="acabNome" placeholder="Nome (Ex: Ilhós)">
                                <input type="number" id="acabPreco" placeholder="Preço Adicional">
                                <button class="btn-gva" onclick="salvarAcabamento()">Salvar</button>
                            </div>
                        </div>
                        <div id="listaGerenciarAcabamentos"></div>
                    </div>

                    <div id="subAdminMenus" class="admin-panel" style="display:none;">
                        <div class="gva-card"><div class="card-header">Nova Categoria</div>
                            <div class="card-body gva-form-large">
                                <input type="text" id="catNome" placeholder="Nome da Categoria">
                                <button class="btn-gva" onclick="salvarCategoria()">Criar Menu</button>
                            </div>
                        </div>
                        <div id="listaGerenciarCategorias"></div>
                    </div>
                </section>

                <section id="abaLoja" class="content"><div id="listaProducao"></div></section>
            </div>
        </main>
    </div>

    <div id="modalFundo"><div id="modalConteudo" class="gva-card"></div></div>
    <div id="alertaFundo"><div id="alertaCaixa"><p id="alertaTexto"></p><button class="btn-gva" onclick="fecharAlerta()">Ok</button></div></div>
    <img id="logoGVA_Preto" src="logo GVA black.png" style="display:none;">

    <script src="script.js"></script>
</body>
</html>
