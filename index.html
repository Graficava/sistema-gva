<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVA • Gráfica Venom Arts</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="gva-body">

    <div id="telaLogin">
        <div class="login-caixa">
            <img src="logo GVA azul.png" alt="GVA" width="160">
            <input type="email" id="loginEmail" placeholder="E-mail">
            <input type="password" id="loginSenha" placeholder="Senha">
            <button class="btn-gva" onclick="fazerLogin()">Entrar</button>
        </div>
    </div>

    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo"><img src="logo GVA br.png" alt="GVA"></div>
            <nav class="sidebar-nav">
                <button id="btnCliente" class="active" onclick="mudarAba('cliente')"><i class="fa fa-th-large"></i> Produtos</button>
                <button id="btnCarrinho" onclick="mudarAba('carrinho')"><i class="fa fa-shopping-cart"></i> Orçamento</button>
                <button id="btnLoja" onclick="mudarAba('loja')"><i class="fa fa-tasks"></i> Produção</button>
                <div class="aba-restrita" style="display:none;">
                    <div class="nav-divider">Gerenciamento</div>
                    <button id="btnCaixa" onclick="mudarAba('caixa')"><i class="fa fa-chart-line"></i> Caixa</button>
                    <button id="btnAdmin" onclick="mudarAba('admin')"><i class="fa fa-cog"></i> Admin</button>
                </div>
            </nav>
            <div class="sidebar-footer"><button onclick="fazerLogout()" class="btn-sair">Sair</button></div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1 id="tituloPagina">Produtos</h1>
                <div style="font-size: 12px; color: #666;">GVA • Gráfica Venom Arts</div>
            </header>

            <div class="content-wrapper">
                <section id="abaCliente" class="content active">
                    <div class="search-container"><input type="text" id="buscaProduto" placeholder="Pesquisar..." oninput="filtrarProdutos()"></div>
                    <div class="zap-grid" id="gradeCliente"></div>
                </section>

                <section id="abaCarrinho" class="content">
                    <div class="flex-row">
                        <div class="flex-main">
                            <div class="gva-card">
                                <div class="card-header">Carrinho</div>
                                <div id="listaCarrinho" class="card-body">Vazio.</div>
                            </div>
                            <div class="gva-card">
                                <div class="card-header">Cliente</div>
                                <div class="card-body">
                                    <div class="form-row">
                                        <div class="form-group"><select id="tipoCliente"><option value="PF">PF</option><option value="PJ">PJ</option></select></div>
                                        <div class="form-group" style="flex:3;"><input type="text" id="nomeCliente" placeholder="Nome"></div>
                                    </div>
                                    <input type="tel" id="telCliente" placeholder="WhatsApp">
                                    <textarea id="obsPedido" placeholder="Notas..."></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="flex-side">
                            <div class="gva-card">
                                <div class="card-header">Resumo</div>
                                <div class="card-body">
                                    <p>Total: <b>R$ <span id="totalCarrinho">0,00</span></b></p>
                                    <input type="number" id="valorSinal" value="0" oninput="atualizarCarrinho()">
                                    <p style="color:red;">Resta: R$ <span id="restanteCarrinho">0,00</span></p>
                                    <button class="btn-success" onclick="enviarPedido()">Criar Pedido</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="abaAdmin" class="content">
                    <div class="sub-nav-gva">
                        <button id="subBtnNovo" class="sub-active" onclick="toggleAdminSub('novo')">Novo</button>
                        <button id="subBtnLista" onclick="toggleAdminSub('lista')">Lista</button>
                    </div>
                    <div id="subAdminNovo" class="gva-card">
                        <div class="card-body">
                            <input type="hidden" id="editId">
                            <input type="text" id="adminNome" placeholder="Nome do Produto">
                            <input type="number" id="adminPreco" placeholder="Preço" step="0.01">
                            <input type="text" id="adminImg" placeholder="Link da Imagem">
                            <select id="adminTipo"><option value="unidade">Unidade</option><option value="m2">M²</option><option value="folha">Página</option></select>
                            <button id="btnSalvarProduto" class="btn-gva" onclick="salvarNovoProduto()">Cadastrar</button>
                        </div>
                    </div>
                    <div id="subAdminLista" style="display:none;"><div id="listaGerenciarAdmin"></div></div>
                </section>

                <section id="abaLoja" class="content"><div id="listaProducao"></div></section>
            </div>

            <footer class="main-footer">
                <div class="footer-grid">
                    <div class="footer-box"><b>GVA • Venom Arts</b><br>CNPJ: 17.184.159/0001-06<br>Rua Lopes Trovão, 474 - Icaraí, Niterói</div>
                    <div class="footer-box">21 99993-0190<br>contato@graficava.com.br</div>
                    <div class="footer-box">Seg a Sex: 10h-16h<br>Sáb: 10h-14h</div>
                </div>
            </footer>
        </main>
    </div>

    <div id="modalFundo"><div id="modalConteudo" class="gva-card"></div></div>
    <div id="alertaFundo"><div id="alertaCaixa"><h3>Aviso</h3><p id="alertaTexto"></p><button class="btn-gva" onclick="fecharAlerta()">Ok</button></div></div>
    <img id="logoGVA_Preto" src="logo GVA black.png" style="display:none;">

    <script src="script.js"></script>
</body>
</html>
